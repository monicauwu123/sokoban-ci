name: Sokoban CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pytest pytest-cov flake8 numpy pygame

      - run: flake8 . || true

      - run: |
          export SDL_VIDEODRIVER=dummy
          pytest tests/ --cov=./