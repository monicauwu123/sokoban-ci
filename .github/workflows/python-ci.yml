name: Sokoban CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT CODE
      # =========================
      - name: Checkout code
        uses: actions/checkout@v4

      # =========================
      # SETUP PYTHON
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # =========================
      # INSTALL DEPENDENCIES
      # =========================
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov flake8 numpy pygame

      # =========================
      # CODE QUALITY (CI METRIC)
      # =========================
      - name: Run flake8
        run: |
          flake8 . --count --statistics || true

      # =========================
      # TEST + COVERAGE (CI METRIC)
      # =========================
      - name: Run tests with coverage
        run: |
          export SDL_VIDEODRIVER=dummy
          pytest tests/ \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml

      # =========================
      # FAKE DEPLOY (CD METRIC)
      # =========================
      - name: Deploy (Simulated)
        if: success()
        run: |
          echo "Deploying application..."
          echo "Deployment successful!"

      # =========================
      # ARTIFACT (CD METRIC)
      # =========================
      - name: Upload artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sokoban-build
          path: .
